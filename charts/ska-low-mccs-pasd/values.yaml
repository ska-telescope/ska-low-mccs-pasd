  deviceServerTypes:
    pasd:
      metadata:
        component: pasd
      image:
        registry: artefact.skao.int
        name: ska-low-mccs-pasd
        tag: 6.1.0
        pullPolicy: IfNotPresent
      command: pasd
      resources:
        requests:
          cpu: 20m
          memory: 50Mi
      livenessProbe:
        initialDelaySeconds: 0
        periodSeconds: 10
        timeoutSeconds: 3
        successThreshold: 1
        failureThreshold: 3
      readinessProbe:
        initialDelaySeconds: 0
        periodSeconds: 10
        timeoutSeconds: 3
        successThreshold: 1
        failureThreshold: 3

