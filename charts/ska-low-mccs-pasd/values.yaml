# Default values for mccs (ska-low-mccs-pasd)
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

display: ":0"
xauthority: "~/.Xauthority"

system: SW-infrastructure
subsystem: low-mccs-pasd
telescope: SKA-low

labels:
  app: ska-low-mccs-pasd

global:
  minikube: true
  tango_host: databaseds-tango-base:10000
  cluster_domain: cluster.local

# Image to be used for simulators etc.
image:
  registry: artefact.skao.int
  name: ska-low-mccs-pasd
  tag: 6.1.0 # defaults to chart's appVersion when empty
  pullPolicy: IfNotPresent

# Resources for simulators etc.
resources:
  requests:
    cpu: 20m
    memory: 50Mi

simulators: {}  # e.g.:
  # pasds:
  #   s8-1:
  #     host: pasd-simulator-s8-1  # mandatory
  #     port: 8502  # optional, defaults to 502
  #     time_multiplier: 1  # optional, defaults to 1

# Reference data from Helm. (mainly used for simulator configuration.)
referenceData: {}
  # pasdconfiguration:
  #   s8-1:
  #     pasd:
  #       smartboxes:
  #         "1":
  #           fndh_port: 1
  #     antennas:
  #       "255":
  #         smartbox: "1"
  #         smartbox_port: 3
  #         masked: false


ska-tango-devices:
  domain: low
  subsystem: mccs
  labels:
    app: ska-low-mccs-pasd
  # deviceDefaults:
    # MccsFieldStation:
    #   LoggingLevelDefault: 5
    #   ConfigurationPort: 8081
    # MccsPasdBus:
    #   Port: 502
    #   Timeout: 10
    #   LoggingLevelDefault: 5
    # MccsFNDH:
    #   LoggingLevelDefault: 5
    # MccsFncc:
    #   LoggingLevelDefault: 5
    # MccsSmartbox:
    #   LoggingLevelDefault: 5
  classProperties:
    MccsFNDH:
      Psu48vVoltage1->max_alarm: 52
      Psu48vVoltage1->max_warning: 50
      Psu48vVoltage1->min_warning: 45
      Psu48vVoltage1->min_alarm: 40
      Psu48vCurrent->max_alarm: 18
      Psu48vCurrent->max_warning: 16
      Psu48vCurrent->min_warning: 0
      Psu48vCurrent->min_alarm: 0
      Psu48vTemperature1->max_alarm: 100
      Psu48vTemperature1->max_warning: 85
      Psu48vTemperature1->min_warning: 0
      Psu48vTemperature1->min_alarm: -5
      FncbTemperature->max_alarm: 85
      FncbTemperature->max_warning: 70
      FncbTemperature->min_warning: 0
      FncbTemperature->min_alarm: -5
      FncbHumidity->max_alarm: 85
      FncbHumidity->max_warning: 75
      FncbHumidity->min_warning: 0
      FncbHumidity->min_alarm: 0
      PowerModuleTemperature->max_alarm: 85
      PowerModuleTemperature->max_warning: 70
      PowerModuleTemperature->min_warning: 0
      PowerModuleTemperature->min_alarm: -5

      # These sensors are redundant or removed in current hardware
      Psu48vVoltage2->max_alarm: Not specified
      Psu48vVoltage2->min_alarm: Not specified
      Psu48vVoltage2->max_warning: Not specified
      Psu48vVoltage2->min_warning: Not specified
      Psu48vTemperature2->max_alarm: Not specified
      Psu48vTemperature2->max_warning: Not specified
      Psu48vTemperature2->min_warning: Not specified
      Psu48vTemperature2->min_alarm: Not specified
      PanelTemperature->max_alarm: Not specified
      PanelTemperature->max_warning: Not specified
      PanelTemperature->min_warning: Not specified
      PanelTemperature->min_alarm: Not specified
      CommsGatewayTemperature->max_alarm: Not specified
      CommsGatewayTemperature->max_warning: Not specified
      CommsGatewayTemperature->min_warning: Not specified
      CommsGatewayTemperature->min_alarm: Not specified
      OutsideTemperature->max_alarm: Not specified
      OutsideTemperature->max_warning: Not specified
      OutsideTemperature->min_warning: Not specified
      OutsideTemperature->min_alarm: Not specified
      InternalAmbientTemperature->max_alarm: Not specified
      InternalAmbientTemperature->max_warning: Not specified
      InternalAmbientTemperature->min_warning: Not specified
      InternalAmbientTemperature->min_alarm: Not specified
    MccsSmartbox:
      InputVoltage->max_alarm: 50
      InputVoltage->max_warning: 49
      InputVoltage->min_warning: 43.2
      InputVoltage->min_alarm: 40
      PowerSupplyOutputVoltage->max_alarm: 5
      PowerSupplyOutputVoltage->max_warning: 4.9
      PowerSupplyOutputVoltage->min_warning: 4.4
      PowerSupplyOutputVoltage->min_alarm: 4
      PowerSupplyTemperature->max_alarm: 85
      PowerSupplyTemperature->max_warning: 70
      PowerSupplyTemperature->min_warning: 0
      PowerSupplyTemperature->min_alarm: -5
      FemHeatsinkTemperature2->max_alarm: 70
      FemHeatsinkTemperature2->max_warning: 65
      FemHeatsinkTemperature2->min_warning: 0
      FemHeatsinkTemperature2->min_alarm: -5
      numberOfPortBreakersTripped->max_alarm: 3
      numberOfPortBreakersTripped->max_warning: 1

      # These sensors are redundant or removed in current hardware
      PcbTemperature->max_alarm: Not specified
      PcbTemperature->max_warning: Not specified
      PcbTemperature->min_warning: Not specified
      PcbTemperature->min_alarm: Not specified
      FemAmbientTemperature->max_alarm: Not specified
      FemAmbientTemperature->max_warning: Not specified
      FemAmbientTemperature->min_warning: Not specified
      FemAmbientTemperature->min_alarm: Not specified
      FemCaseTemperature1->max_alarm: Not specified
      FemCaseTemperature1->max_warning: Not specified
      FemCaseTemperature1->min_warning: Not specified
      FemCaseTemperature1->min_alarm: Not specified
      FemCaseTemperature2->max_alarm: Not specified
      FemCaseTemperature2->max_warning: Not specified
      FemCaseTemperature2->min_warning: Not specified
      FemCaseTemperature2->min_alarm: Not specified
      FemHeatsinkTemperature1->max_alarm: Not specified
      FemHeatsinkTemperature1->max_warning: Not specified
      FemHeatsinkTemperature1->min_warning: Not specified
      FemHeatsinkTemperature1->min_alarm: Not specified

